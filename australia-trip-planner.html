<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>旅行共创行程规划</title>
  <style>
    :root {
      --ink: #172026;
      --muted: #65717a;
      --line: #d9e0e6;
      --paper: #f5f7f8;
      --panel: #ffffff;
      --accent: #0b7a75;
      --accent-2: #b3452d;
      --accent-3: #2f5d8c;
      --soft: #e8f2ef;
      --warning: #fff0d9;
      --shadow: 0 18px 45px rgba(23, 32, 38, 0.09);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--paper);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      line-height: 1.5;
      letter-spacing: 0;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    .shell {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 320px minmax(0, 1fr);
    }

    .sidebar {
      position: sticky;
      top: 0;
      height: 100vh;
      overflow: auto;
      padding: 22px;
      background: #ffffff;
      border-right: 1px solid var(--line);
    }

    .brand {
      display: grid;
      gap: 8px;
      margin-bottom: 18px;
    }

    .brand h1 {
      margin: 0;
      font-size: 24px;
      line-height: 1.15;
    }

    .brand p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
    }

    .trip-switcher {
      display: grid;
      gap: 8px;
      margin: 18px 0;
    }

    .switcher-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .trip-card {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 11px;
      background: #fbfcfc;
      color: var(--ink);
      cursor: pointer;
      text-align: left;
      display: grid;
      gap: 7px;
      transition: border-color .18s ease, background .18s ease, transform .18s ease;
    }

    .trip-card:hover,
    .trip-card.active {
      border-color: var(--accent);
      background: var(--soft);
      transform: translateY(-1px);
    }

    .trip-card strong {
      display: block;
      font-size: 15px;
      line-height: 1.2;
    }

    .trip-card span {
      color: var(--muted);
      font-size: 12px;
    }

    .trip-card-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .trip-card-meta small {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 3px 7px;
      background: #fff;
      color: #34414a;
      font-size: 11px;
    }

    .nav {
      display: none;
    }

    .nav-legacy {
      display: grid;
      gap: 8px;
      margin-top: 18px;
    }

    .nav-legacy button {
      width: 100%;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      border-radius: 8px;
      padding: 12px;
      cursor: pointer;
      text-align: left;
      display: grid;
      grid-template-columns: 46px 1fr;
      align-items: center;
      gap: 12px;
      transition: border-color .18s ease, background .18s ease, transform .18s ease;
    }

    .nav-legacy button:hover,
    .nav-legacy button.active {
      border-color: var(--accent);
      background: var(--soft);
      transform: translateY(-1px);
    }

    .nav-legacy img {
      width: 46px;
      height: 46px;
      border-radius: 8px;
      object-fit: cover;
      background: #d9e0e6;
    }

    .nav-legacy b {
      display: block;
      font-size: 14px;
    }

    .nav-legacy small {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-top: 2px;
    }

    .content {
      min-width: 0;
      padding: 28px;
    }

    .overview {
      margin-bottom: 20px;
    }

    .summary-panel,
    .workspace-panel,
    .budget-panel,
    .detail {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .workspace-panel {
      overflow: hidden;
    }

    .workspace-head {
      padding: 20px 22px 0;
      display: grid;
      gap: 14px;
    }

    .workspace-title {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }

    .workspace-title h2 {
      margin: 0;
      font-size: 24px;
      line-height: 1.15;
    }

    .workspace-title p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .workspace-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      border-bottom: 1px solid var(--line);
      padding-bottom: 10px;
    }

    .workspace-tabs button {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: #34414a;
      padding: 9px 12px;
      cursor: pointer;
      font-weight: 700;
      font-size: 13px;
    }

    .workspace-tabs button.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .workspace-body {
      padding: 20px 22px 22px;
    }

    .workspace-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.55fr) minmax(320px, .75fr);
      gap: 16px;
      align-items: start;
    }

    .route-dashboard {
      display: grid;
      gap: 12px;
    }

    .route-header {
      display: flex;
      justify-content: space-between;
      align-items: start;
      gap: 14px;
      flex-wrap: wrap;
    }

    .route-header h2 {
      margin: 0;
      font-size: 26px;
      line-height: 1.15;
    }

    .route-header p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 13px;
      max-width: 68ch;
    }

    .metric-strip {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
    }

    .metric {
      border: 1px solid #e4e9ed;
      border-radius: 8px;
      padding: 10px;
      background: #fbfcfc;
      min-height: 74px;
      display: grid;
      align-content: center;
      gap: 2px;
    }

    .metric strong {
      font-size: 18px;
      line-height: 1.1;
    }

    .metric span {
      color: var(--muted);
      font-size: 12px;
    }

    .overview-insights {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .overview-insight {
      border: 1px solid #e4e9ed;
      border-radius: 8px;
      padding: 11px;
      background: #fff;
      display: grid;
      gap: 6px;
      min-height: 104px;
    }

    .overview-insight b {
      color: var(--accent-3);
      font-size: 13px;
    }

    .overview-insight p {
      margin: 0;
      color: #35424b;
      font-size: 12px;
    }

    .trip-form {
      display: grid;
      gap: 12px;
    }

    .constraint-section {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      background: #fbfcfc;
      display: grid;
      gap: 10px;
    }

    .constraint-section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .constraint-section-head b {
      font-size: 13px;
      color: #23313a;
    }

    .small-btn {
      border: 1px solid var(--accent);
      border-radius: 8px;
      padding: 7px 9px;
      background: #fff;
      color: var(--accent);
      cursor: pointer;
      font-weight: 700;
      font-size: 12px;
    }

    .destination-list,
    .sortable-list {
      display: grid;
      gap: 8px;
    }

    .destination-row {
      display: grid;
      grid-template-columns: minmax(0, 1.2fr) minmax(88px, .45fr) auto;
      gap: 8px;
      align-items: center;
    }

    .destination-row input {
      min-width: 0;
    }

    .icon-btn {
      width: 40px;
      height: 40px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: #58656f;
      cursor: pointer;
      font-weight: 800;
    }

    .icon-btn:hover {
      border-color: var(--accent-2);
      color: var(--accent-2);
    }

    .order-mode-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(180px, .55fr);
      gap: 10px;
      align-items: end;
    }

    .sortable-item {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      background: #fff;
      display: grid;
      grid-template-columns: 44px minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
      cursor: grab;
    }

    .sortable-item.dragging {
      opacity: .55;
      border-color: var(--accent);
      background: var(--soft);
    }

    .drag-handle {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 5px 6px;
      text-align: center;
      color: var(--muted);
      font-size: 12px;
      user-select: none;
    }

    .sortable-item strong {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 13px;
    }

    .sortable-item span:last-child {
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    .mini-hint {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
    }

    .is-hidden {
      display: none !important;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .chip {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 6px 10px;
      background: #fbfcfc;
      color: #34414a;
      font-size: 12px;
    }

    .version-list {
      display: grid;
      gap: 10px;
    }

    .version-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      background: #fbfcfc;
      display: grid;
      gap: 7px;
    }

    .budget-summary-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 14px;
    }

    .budget-tile {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      background: #fbfcfc;
      display: grid;
      gap: 4px;
      min-height: 82px;
    }

    .budget-tile span {
      color: var(--muted);
      font-size: 12px;
    }

    .budget-tile strong {
      font-size: 20px;
      line-height: 1.1;
    }

    .budget-city-grid {
      display: grid;
      gap: 12px;
    }

    .budget-city-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      overflow: hidden;
    }

    .budget-city-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 14px;
      background: #fbfcfc;
      border-bottom: 1px solid var(--line);
    }

    .budget-city-head h4 {
      margin: 0;
      font-size: 16px;
    }

    .budget-city-head p {
      margin: 3px 0 0;
      color: var(--muted);
      font-size: 12px;
    }

    .budget-city-total {
      text-align: right;
      white-space: nowrap;
    }

    .budget-city-total b {
      display: block;
      font-size: 18px;
    }

    .budget-table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }

    .budget-table th,
    .budget-table td {
      border-bottom: 1px solid #eef2f4;
      padding: 8px;
      vertical-align: top;
      text-align: left;
    }

    .budget-table th {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      background: #fff;
    }

    .budget-table input,
    .budget-table select {
      padding: 8px;
      font-size: 12px;
    }

    .budget-table .amount-input {
      text-align: right;
    }

    .budget-tools {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 12px 14px;
      background: #fbfcfc;
    }

    .summary-panel {
      overflow: hidden;
      min-height: 0;
      display: grid;
      grid-template-columns: 1fr;
    }

    .hero-text {
      padding: 20px;
      display: grid;
      gap: 14px;
    }

    .hero-text h2 {
      margin: 0;
      font-size: 26px;
      line-height: 1.15;
    }

    .hero-text p {
      margin: 0;
      color: var(--muted);
      max-width: 56ch;
    }

    .route-flow {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      align-items: stretch;
    }

    .route-stop {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      min-height: 96px;
      background: #fbfcfc;
      position: relative;
      display: grid;
      align-content: center;
      gap: 5px;
      word-break: keep-all;
      color: var(--ink);
      cursor: pointer;
      text-align: left;
      font: inherit;
      width: 100%;
      transition: border-color .18s ease, background .18s ease, transform .18s ease;
    }

    .route-stop:hover,
    .route-stop.active {
      border-color: var(--accent);
      background: var(--soft);
      transform: translateY(-1px);
    }

    .route-stop:not(:last-child)::after {
      content: "→";
      position: absolute;
      right: -15px;
      top: 50%;
      transform: translateY(-50%);
      width: 20px;
      height: 20px;
      display: grid;
      place-items: center;
      border-radius: 999px;
      background: var(--accent);
      color: #fff;
      font-size: 13px;
      font-weight: 700;
      z-index: 2;
    }

    .route-stop strong {
      font-size: 18px;
      line-height: 1.15;
      white-space: nowrap;
    }

    .route-stop span {
      color: var(--muted);
      font-size: 12px;
    }

    .route-stop em {
      color: var(--accent);
      font-style: normal;
      font-weight: 700;
      font-size: 12px;
      line-height: 1.35;
    }

    .route-stop .route-badge {
      width: fit-content;
      border-radius: 999px;
      padding: 3px 7px;
      background: #fff0d9;
      color: #815313;
      border: 1px solid #f1d39b;
      font-size: 11px;
      font-weight: 700;
    }

    .generated-summary {
      border: 1px solid #bddbd6;
      border-left: 4px solid var(--accent);
      border-radius: 8px;
      padding: 12px;
      background: #f4fbf9;
      display: grid;
      gap: 8px;
    }

    .generated-summary strong {
      font-size: 14px;
    }

    .generated-summary p,
    .generated-summary li {
      margin: 0;
      color: #35424b;
      font-size: 12px;
    }

    .generated-summary ul {
      margin: 0;
      padding-left: 18px;
      display: grid;
      gap: 4px;
    }

    .hero-img {
      min-height: 260px;
      background-image: url("https://images.unsplash.com/photo-1523482580672-f109ba8cb9be?auto=format&fit=crop&w=1200&q=80");
      background-size: cover;
      background-position: center;
    }

    .pill-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .pill {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 12px;
      background: #fff;
      color: #34414a;
      white-space: nowrap;
    }

    .budget-panel {
      padding: 18px;
      display: grid;
      gap: 12px;
      align-content: start;
    }

    .budget-panel h3,
    .detail h3,
    .block h4 {
      margin: 0;
    }

    .budget-row {
      display: grid;
      grid-template-columns: 86px 1fr 72px;
      gap: 10px;
      align-items: center;
      font-size: 13px;
    }

    .bar {
      height: 9px;
      border-radius: 999px;
      background: #e5eaee;
      overflow: hidden;
    }

    .bar span {
      display: block;
      height: 100%;
      border-radius: inherit;
      background: var(--accent);
    }

    .detail {
      overflow: hidden;
    }

    .place-head {
      min-height: 260px;
      padding: 24px;
      display: grid;
      align-content: end;
      background-size: cover;
      background-position: center;
      color: #fff;
      position: relative;
    }

    .place-head::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(0,0,0,.15), rgba(0,0,0,.72));
    }

    .place-head > * {
      position: relative;
      z-index: 1;
    }

    .place-head h2 {
      margin: 0 0 8px;
      font-size: 34px;
      line-height: 1.1;
      text-shadow: 0 2px 10px rgba(0,0,0,.25);
    }

    .place-head p {
      margin: 0;
      max-width: 68ch;
      color: rgba(255,255,255,.9);
    }

    .detail-body {
      padding: 22px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 340px;
      gap: 18px;
    }

    .main-col,
    .side-col {
      display: grid;
      gap: 14px;
      align-content: start;
    }

    .block {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
      background: #fff;
    }

    .block h4 {
      font-size: 16px;
      margin-bottom: 10px;
    }

    .timeline {
      display: grid;
      gap: 10px;
    }

    .day {
      border-left: 3px solid var(--accent);
      padding-left: 12px;
      display: grid;
      gap: 8px;
    }

    .day-title {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      justify-content: space-between;
      font-weight: 700;
    }

    .slot-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .slot {
      min-height: 112px;
      border: 1px solid #e4e9ed;
      border-radius: 8px;
      padding: 10px;
      background: #fbfcfc;
    }

    .slot b {
      display: block;
      color: var(--accent-3);
      margin-bottom: 6px;
      font-size: 13px;
    }

    .slot p,
    .block p,
    .block li {
      color: #35424b;
      font-size: 13px;
      margin: 0;
    }

    .list {
      margin: 0;
      padding-left: 18px;
      display: grid;
      gap: 7px;
    }

    .hotel {
      display: grid;
      gap: 6px;
      padding: 10px;
      border: 1px solid #e4e9ed;
      border-radius: 8px;
      background: #fbfcfc;
    }

    .hotel strong {
      font-size: 14px;
    }

    .tagline {
      color: var(--muted);
      font-size: 12px;
    }

    .note {
      border-left: 3px solid var(--accent-2);
      background: #fff7f3;
      padding: 10px 12px;
      border-radius: 8px;
      color: #553125;
      font-size: 13px;
    }

    .tool-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .tool {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
      background: #fff;
      min-height: 138px;
      display: grid;
      gap: 7px;
      align-content: start;
    }

    .tool a {
      color: var(--accent);
      font-weight: 700;
      text-decoration: none;
    }

    .tool a:hover {
      text-decoration: underline;
    }

    .idea-layout {
      display: grid;
      grid-template-columns: minmax(0, .95fr) minmax(0, 1.05fr);
      gap: 14px;
      align-items: start;
    }

    .idea-form {
      display: grid;
      gap: 12px;
    }

    .field-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    label {
      display: grid;
      gap: 6px;
      color: #34414a;
      font-size: 12px;
      font-weight: 700;
    }

    input,
    select,
    textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px 11px;
      color: var(--ink);
      background: #fff;
      outline: none;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(11, 122, 117, .12);
    }

    textarea {
      min-height: 128px;
      resize: vertical;
    }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .action-btn {
      border: 1px solid var(--accent);
      border-radius: 8px;
      padding: 10px 12px;
      background: var(--accent);
      color: #fff;
      cursor: pointer;
      font-weight: 700;
    }

    .action-btn.secondary {
      background: #fff;
      color: var(--accent);
    }

    .idea-list {
      display: grid;
      gap: 10px;
    }

    .idea-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      background: #fbfcfc;
      display: grid;
      gap: 9px;
    }

    .idea-meta {
      display: flex;
      flex-wrap: wrap;
      align-items: center;

    }

      padding: 12px;

      gap: 8px;

    }

      color: #35424b;
      font-size: 13px;
    }

    .agent-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .agent-check {

      border-radius: 8px;
      padding: 10px;
      background: #fff;
      display: grid;
      gap: 6px;
    }

    .agent-check b {

    .agent-check ul {

    }

    .agent-check li {

      font-size: 12px;

    }

    .status-line {
      min-height: 20px;
      color: var(--muted);
      font-size: 12px;
    }

    .grade {

      }

      }

      }

      .overview,
      .summary-panel,
      .workspace-grid,
      .detail-body {

      }
    }

      }

    function createConstraintId(name = "destination") {
      const slug = String(name || "destination")
        .trim()
        .toLowerCase()
        .replace(/[^a-z0-9\u4e00-\u9fa5]+/g, "-")
        .replace(/^-+|-+$/g, "");
      return `${slug || "destination"}-${Math.random().toString(36).slice(2, 7)}`;
    }

    function normalizeDestinations(destinations) {
      const seen = new Set();
      return (Array.isArray(destinations) ? destinations : [])
        .map((destination, index) => {
          const name = String(destination?.name || "").trim();
          if (!name) return null;
          let id = String(destination?.id || "").trim() || createConstraintId(name);
          if (seen.has(id)) id = `${id}-${index + 1}`;
          seen.add(id);
          return {
            id,
            name,
            nights: String(destination?.nights || "").trim() || "待定"
          };
        })
        .filter(Boolean);
    }

    function parseDestinationsFromNights(nightsText) {
      return String(nightsText || "")
        .split(/[;；,，]/)
        .map(part => part.trim())
        .filter(part => part && part !== "未填写")
        .map(part => {
          const match = part.match(/^(.+?)\s*(\d+\s*(?:晚|night|nights)|待定)$/i);
          const name = match ? match[1].trim() : part;
          const nights = match ? match[2].replace(/\s+/g, "") : "待定";
          return {
            id: createConstraintId(name),
            name,
            nights
          };
        });
    }

    function getDestinationSummary(destinations = getTripConstraints().destinations) {
      const rows = normalizeDestinations(destinations);

    }

    function getOrderedDestinations(constraints = getTripConstraints()) {
      const destinations = normalizeDestinations(constraints.destinations);
      const byId = Object.fromEntries(destinations.map(destination => [destination.id, destination]));
      const ordered = (Array.isArray(constraints.order) ? constraints.order : [])
        .map(id => byId[id])
        .filter(Boolean);
      const missing = destinations.filter(destination => !ordered.some(item => item.id === destination.id));
      return [...ordered, ...missing];
    }

    function getOrderSummary(constraints = getTripConstraints()) {
      if (constraints.orderMode !== "fixed") return "不固定，允许 Agent 根据交通、价格和体验优化顺序";
      return getOrderedDestinations(constraints).map(item => item.name).join(" → ") || "固定，但还没有填写地点";

    function getTripConstraints() {
      const defaults = getDefaultTripConstraints();
      try {
        const saved = JSON.parse(localStorage.getItem(tripConstraintsStorageKey) || "null");
        if (!saved || typeof saved !== "object") return defaults;
        const savedDestinations = normalizeDestinations(saved.destinations);
        const destinations = savedDestinations.length
          ? savedDestinations
          : parseDestinationsFromNights(saved.nights || defaults.nights);
        const fallbackDestinations = destinations.length ? destinations : normalizeDestinations(defaults.destinations);
        const validIds = new Set(fallbackDestinations.map(destination => destination.id));
        const savedOrder = Array.isArray(saved.order) ? saved.order.filter(id => validIds.has(id)) : [];
        const order = savedOrder.length ? savedOrder : fallbackDestinations.map(destination => destination.id);
        const orderMode = saved.orderMode
          ? (saved.orderMode === "flexible" ? "flexible" : "fixed")
          : (defaults.orderMode || "flexible");
        return {
          ...defaults,
          ...saved,
          destinations: fallbackDestinations,
          orderMode,
          order,
          fixedItems: Array.isArray(saved.fixedItems) ? saved.fixedItems : defaults.fixedItems
        };
      } catch {
        return defaults;
      }
    }

    function parsePlaceStartDate(place, fallbackIndex = 0) {
      const dateText = `${place?.dates || ""} ${Array.isArray(place?.days) && place.days[0] ? place.days[0][0] : ""}`;
      const match = dateText.match(/(\d{1,2})\s*(?:月|\/|-)\s*(\d{1,2})/);
      if (!match) return 999999 + fallbackIndex;
      const month = Number(match[1]);
      const day = Number(match[2]);
      return month * 100 + day;
    }

    function getRouteOrderedPlaces() {
      return getTripPlaceIds()
        .map((id, index) => ({ place: places.find(item => item.id === id), index }))
        .filter(item => item.place)
        .sort((a, b) => {
          const dateDiff = parsePlaceStartDate(a.place, a.index) - parsePlaceStartDate(b.place, b.index);
          return dateDiff || a.index - b.index;
        })
        .map(item => item.place);
    }

    function normalizePlace(candidate, fallback) {
      return {
        ...fallback,
        ...candidate,
        id: fallback.id,
        name: candidate?.name || fallback.name,
        dates: candidate?.dates || fallback.dates,
        thesis: candidate?.thesis || fallback.thesis,
        hotels: Array.isArray(candidate?.hotels) ? candidate.hotels : fallback.hotels,
        transport: Array.isArray(candidate?.transport) ? candidate.transport : fallback.transport,
        advice: Array.isArray(candidate?.advice) ? candidate.advice : fallback.advice,
        days: Array.isArray(candidate?.days) ? candidate.days : fallback.days
      };
    }

    function applyGeneratedPlaces(updatedPlaces) {
      if (!Array.isArray(updatedPlaces)) return false;
      const ids = getTripPlaceIds();
      let changed = false;

      ids.forEach(id => {
        const currentIndex = places.findIndex(place => place.id === id);
        const fallback = originalPlaces.find(place => place.id === id);
        const candidate = updatedPlaces.find(place => place.id === id);
        if (currentIndex >= 0 && fallback && candidate) {
          places[currentIndex] = normalizePlace(candidate, fallback);
          changed = true;
        }
      });

      return changed;
    }

    function restoreOriginalPlaces() {
      getTripPlaceIds().forEach(id => {
        const currentIndex = places.findIndex(place => place.id === id);
        const fallback = originalPlaces.find(place => place.id === id);
        if (currentIndex >= 0 && fallback) {
          places[currentIndex] = JSON.parse(JSON.stringify(fallback));
        }
      });
      clearGeneratedTrip();
    }

    function bootstrapGeneratedTrip() {

    function comparablePlace(place) {
      if (!place) return null;
      return {
        dates: place.dates,
        thesis: place.thesis,
        hotels: place.hotels,
        transport: place.transport,
        advice: place.advice,
        days: place.days
      };
    }

    function hasGeneratedChanges(placeId) {
      const current = places.find(place => place.id === placeId);
      const original = originalPlaces.find(place => place.id === placeId);
      if (!current || !original || !getGeneratedTrip()?.updatedPlaces) return false;
      return JSON.stringify(comparablePlace(current)) !== JSON.stringify(comparablePlace(original));
    }

    function isPlaceExplicitlyChanged(placeId) {
      const generated = getGeneratedTrip();
      if (!generated) return false;
      const aliases = {
        perth: ["珀斯", "perth", "rotto", "rottnest", "粉红湖", "尖峰石阵"],
        melbourne: ["墨尔本", "melbourne", "考拉", "企鹅", "phillip", "moonlit"],
        whitsundays: ["圣灵群岛", "whitsundays", "whitehaven", "hill inlet", "心形礁", "外堡礁"],
        sydney: ["悉尼", "sydney", "bondi", "fish market", "鱼市场", "悉尼大学", "opera house"]
      };
      const changeText = [
        ...(Array.isArray(generated.changes) ? generated.changes : []),
        generated.summary || ""
      ].join("\n").toLowerCase();
      const candidates = aliases[placeId] || [];
      return candidates.some(alias => changeText.includes(alias.toLowerCase()));
    }

    function shouldShowGeneratedBadge(placeId) {
      const generated = getGeneratedTrip();
      if (!generated) return false;
      if (Array.isArray(generated.changes) && generated.changes.length) {
        return isPlaceExplicitlyChanged(placeId);
      }
      return hasGeneratedChanges(placeId);
    }

    function analyzeIdea(idea) {
      const text = `${idea.destination} ${idea.category} ${idea.text}`.toLowerCase();
      const impacts = [];

      if (/早起|太早|睡|晚起|晚一点|不想早/.test(text)) {
        impacts.push(["时间", "会影响 10/1 墨尔本 07:40 早班机，可能需要机场酒店或改航班。"]);
      }
      if (/蓝山|大洋路|袋鼠岛|adelaide|阿德莱德|kangaroo/.test(text)) {
        impacts.push(["景点", "属于长距离加点，当前 10 晚结构里会挤压墨尔本/悉尼唯一完整白天。"]);
      }
      if (/粉红湖|hutt|pink/.test(text)) {
        impacts.push(["路线", "粉红湖是硬约束，建议只调整当天节奏，不从主线删除。"]);
      }
      if (/全包|豪华|mirage|hayman|qualia|hamilton|服务好|度假村/.test(text)) {
        impacts.push(["预算", "圣灵群岛升级会明显抬高总价，珀斯/墨尔本/悉尼住宿需要更克制。"]);
      }
      if (/便宜|预算|贵|超预算|省钱|性价比|188|all suites/.test(text)) {
        impacts.push(["住宿", "可以优先替换珀斯或墨尔本住宿，但要守住两卧和取消政策。"]);
      }
      if (/航班|飞机|转机|机场|起飞|到达|per|mel|ppp|syd/.test(text)) {
        impacts.push(["航班", "需要重新核验起降时间，尤其是是否影响当天上午/晚上行程。"]);
      }
      if (/考拉|袋鼠|企鹅|动物/.test(text)) {
        impacts.push(["游玩", "最适合放在 9/30 墨尔本 Moonlit + Phillip Island 这一天。"]);
      }
      if (/白天堂|whitehaven|hill inlet|心形礁|外堡礁|reef/.test(text)) {
        impacts.push(["圣灵群岛", "建议保留 10/2 Whitehaven，10/3 在外堡礁和心形礁之间取舍。"]);
      }
      if (!impacts.length) {
        impacts.push(["待判断", "这条建议需要结合预算、同行人优先级和当天交通再判断。"]);
      }

      if (idea.priority === "must") {
        impacts.unshift(["优先级", "这是强需求，重排时优先保留，其他项目为它让位。"]);
      }

      return impacts;
    }

        return `${index + 1}. ${idea.name || "未署名"}｜${idea.destination}｜${idea.category}｜${idea.priorityLabel}\n建议：${idea.text}\n初步影响：${impacts}`;

      return `请基于以下基础约束、硬约束和同行建议，重排旅行行程。\n\n基础约束：\n目的地：${basics.destination}\n旅行范围：${basics.scope}\n时间：${basics.dates}\n同行人：${basics.travelers}\n预算：${basics.budget}\n节奏偏好：${basics.pace}\n必须保留：${basics.mustGo}\n尽量避免：${basics.avoid}\n\n硬约束：\n${formatConstraintsForPrompt()}\n\n同行建议：\n${rows || "暂无建议"}`;

    function getApiEndpoint() {
      if (location.protocol === "file:") return "http://127.0.0.1:8787/api/plan";
      return "/api/plan";

    function getApiBase() {
      if (location.protocol === "file:") return "http://127.0.0.1:8787";
      return "";
    }

    async function fetchJson(path, options = {}) {
      const response = await fetch(`${getApiBase()}${path}`, {
        ...options,
        headers: {
          "Content-Type": "application/json",
          ...(options.headers || {})
        }
      });
      const data = await response.json().catch(() => ({}));
      if (!response.ok) {
        throw new Error(data.error || `请求失败：HTTP ${response.status}`);
      }
      return data;
    }

    async function syncStateFromServer() {
      try {
        const state = await fetchJson("/api/state");
        saveIdeas(state.ideas || []);
        saveVersions(state.versions || []);
        saveActiveVersionId(state.activeVersionId || "");
        if (state.generatedTrip) {
          saveGeneratedTrip(state.generatedTrip);
          applyGeneratedPlaces(state.generatedTrip.updatedPlaces);
        } else {
          restoreOriginalPlaces();
        }
        refreshNavForCurrentPlace();
        renderIdeaList();
        refreshIdeaExport();
        const output = document.getElementById("aiOutput");
        if (output) {
          const generated = getGeneratedTrip();
          output.innerHTML = generated ? renderAgentResult(generated) : "还没有生成新版。先收集建议，再点击“生成新版计划”。";
        }
      } catch {
        renderIdeaList();
        refreshIdeaExport();
      }

    function sortDestinationsForEditor(destinations, order) {
      const normalized = normalizeDestinations(destinations);
      const byId = Object.fromEntries(normalized.map(destination => [destination.id, destination]));
      const ordered = (Array.isArray(order) ? order : []).map(id => byId[id]).filter(Boolean);
      const missing = normalized.filter(destination => !ordered.some(item => item.id === destination.id));
      return [...ordered, ...missing];
    }

    function renderSortableDestinations(destinations, order) {
      const rows = sortDestinationsForEditor(destinations, order);
      return rows.map(destination => `
        <div class="sortable-item" draggable="true" data-sortable-destination="${escapeHTML(destination.id)}">
          <span class="drag-handle">拖拽</span>
          <strong>${escapeHTML(destination.name)}</strong>
          <span>${escapeHTML(destination.nights)}</span>
        </div>
      `).join("");
    }

    function getOrderFromSortableList() {
      return [...document.querySelectorAll("[data-sortable-destination]")].map(item => item.dataset.sortableDestination);
    }

    function getDragAfterElement(container, y) {
      const draggableElements = [...container.querySelectorAll(".sortable-item:not(.dragging)")];
      return draggableElements.reduce((closest, child) => {
        const box = child.getBoundingClientRect();
        const offset = y - box.top - box.height / 2;
        if (offset < 0 && offset > closest.offset) {
          return { offset, element: child };
        }
        return closest;
      }, { offset: Number.NEGATIVE_INFINITY }).element;
    }

    function bindSortableDestinations() {
      const list = document.getElementById("sortableDestinations");
      if (!list) return;

      list.querySelectorAll(".sortable-item").forEach(item => {
        item.addEventListener("dragstart", event => {
          item.classList.add("dragging");
          event.dataTransfer.effectAllowed = "move";
          event.dataTransfer.setData("text/plain", item.dataset.sortableDestination || "");
        });

        item.addEventListener("dragend", () => {
          item.classList.remove("dragging");
        });
      });

      list.ondragover = event => {
        event.preventDefault();
        const dragging = list.querySelector(".dragging");
        if (!dragging) return;
        const afterElement = getDragAfterElement(list, event.clientY);
        if (!afterElement) {
          list.appendChild(dragging);
        } else {
          list.insertBefore(dragging, afterElement);
        }
      };
    }

    function bindConstraintEditor() {
      const form = document.getElementById("tripConstraintsForm");
      const list = document.getElementById("destinationRows");
      const sortable = document.getElementById("sortableDestinations");
      const orderMode = document.getElementById("orderMode");
      const orderEditor = document.getElementById("orderEditor");
      if (!form || !list || !sortable || !orderMode || !orderEditor) return;

      const refreshSortable = () => {
        const rows = getDestinationRowsFromForm(form);
        const currentOrder = getOrderFromSortableList();
        sortable.innerHTML = renderSortableDestinations(rows, currentOrder);
        bindSortableDestinations();

      const toggleOrderEditor = () => {
        orderEditor.classList.toggle("is-hidden", orderMode.value !== "fixed");

      document.getElementById("addDestination")?.addEventListener("click", () => {
        const id = createConstraintId("destination");
        list.insertAdjacentHTML("beforeend", renderDestinationRows([{ id, name: "", nights: "待定" }]));
        list.querySelector(`[data-destination-id="${CSS.escape(id)}"]`)?.querySelector("input")?.focus();
        refreshSortable();
      });

      list.addEventListener("click", event => {
        const button = event.target.closest("[data-remove-destination]");
        if (!button) return;
        button.closest("[data-destination-row]")?.remove();
        refreshSortable();
      });

      list.addEventListener("input", refreshSortable);
      orderMode.addEventListener("change", toggleOrderEditor);
      toggleOrderEditor();
      bindSortableDestinations();
    }

    function formatGeneratedSummary(plan) {
      const lines = [];
      if (plan?.summary) lines.push(plan.summary);
      const report = plan?.agentReport || {};
      const reportItems = [
        ["采纳建议", report.adoptedIdeas],
        ["冲突/未采纳", [...(report.rejectedIdeas || []), ...(report.conflicts || [])]],
        ["硬约束检查", report.hardConstraintCheck],
        ["下一步核验", report.nextChecks]
      ];
      reportItems.forEach(([title, items]) => {
        if (Array.isArray(items) && items.length) {
          lines.push("");
          lines.push(`${title}：`);
          items.forEach(item => lines.push(`- ${item}`));
        }
      });
      if (Array.isArray(plan?.changes) && plan.changes.length) {
        lines.push("");
        lines.push("本次调整：");
        plan.changes.forEach(change => lines.push(`- ${change}`));
      }
      lines.push("");
      lines.push("行程总览和下方城市模块已按新版计划更新。可点击总览里的城市节点查看。");
      return lines.join("\n");
    }

    function bindIdeaEvents() {
      const form = document.getElementById("ideaForm");
      const fillExample = document.getElementById("fillExample");
      const clearIdeas = document.getElementById("clearIdeas");
      const generateAI = document.getElementById("generateAI");
      const restorePlan = document.getElementById("restorePlan");
      const focusIdeaForm = document.getElementById("focusIdeaForm");
      if (!form) return;

      form.addEventListener("submit", async event => {
        event.preventDefault();
        const data = new FormData(form);
        const priority = data.get("priority");
        const priorityMap = {
          nice: "想要，可让步",
          important: "比较重要",
          must: "必须满足"
        };
        const idea = {
          id: `${Date.now()}-${Math.random().toString(16).slice(2)}`,
          name: String(data.get("name") || "").trim(),
          destination: String(data.get("destination") || "全程"),
          category: String(data.get("category") || "想加景点"),
          priority,
          priorityLabel: priorityMap[priority] || "想要，可让步",
          text: String(data.get("text") || "").trim(),
          createdAt: new Date().toLocaleString("zh-CN", { hour12: false })
        };
        if (!idea.text) return;
        try {
          const data = await fetchJson("/api/ideas", {
            method: "POST",
            body: JSON.stringify(idea)
          });
          saveIdeas(data.ideas || [idea, ...getIdeas()]);
          saveVersions(data.versions || getVersions());
          saveActiveVersionId(data.activeVersionId || activeVersionId);
        } catch {
          saveIdeas([idea, ...getIdeas()]);
        }
        form.reset();
        renderIdeaList();
        refreshIdeaExport();
      });

      fillExample?.addEventListener("click", () => {
        form.elements.name.value = "示例";
        form.elements.destination.value = "圣灵群岛";
        form.elements.category.value = "住宿偏好";
        form.elements.priority.value = "important";
        form.elements.text.value = "圣灵群岛想住得好一点，如果 Mirage 比 Portside 贵很多，可以看看其他城市住宿能不能压预算。";
      });

      focusIdeaForm?.addEventListener("click", () => {
        form.scrollIntoView({ behavior: "smooth", block: "start" });
        form.elements.text.focus();
      });

      generateAI?.addEventListener("click", async () => {
        const status = document.getElementById("aiStatus");
        const output = document.getElementById("aiOutput");
        status.textContent = "正在生成新版计划...";
        output.textContent = "生成中，请稍等。";
        generateAI.disabled = true;

        try {
          const response = await fetch(getApiEndpoint(), {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              trip: getCurrentTripPayload(),
              prompt: buildIdeaExport()
            })
          });
          const data = await response.json().catch(() => ({}));
          if (!response.ok) {
            throw new Error(data.error || `请求失败：HTTP ${response.status}`);
          }
          if (!data.updatedTrip?.updatedPlaces) {
            throw new Error("已收到模型回复，但没有拿到可更新行程模块的结构化结果。");
          }
          const applied = applyGeneratedPlaces(data.updatedTrip.updatedPlaces);
          if (!applied) {
            throw new Error("新版计划格式不完整，暂未更新行程模块。");
          }
          saveGeneratedTrip(data.updatedTrip);
          saveIdeas(data.ideas || getIdeas());
          saveVersions(data.versions || (data.version ? [data.version, ...getVersions()] : getVersions()));
          saveActiveVersionId(data.activeVersionId || data.version?.id || "");
          refreshNavForCurrentPlace();
          if (activeWorkspaceTab === "overview") {
            renderWorkspaceTab("overview");
          }
          status.textContent = "已生成并更新行程总览和城市模块。";
          output.innerHTML = renderAgentResult(data.updatedTrip);
        } catch (error) {
          status.textContent = "调用失败。";
          const message = error instanceof TypeError && /fetch/i.test(error.message)
            ? "在线推演服务暂时不可用，请确认网站服务已经启动后再试。"
            : (error.message || "在线推演服务暂时不可用，请稍后再试。");
          output.textContent = message;
        } finally {
          generateAI.disabled = false;
        }
      });

      restorePlan?.addEventListener("click", async () => {
        try {
          const state = await fetchJson("/api/reset-plan", { method: "POST" });
          saveVersions(state.versions || getVersions());
          saveActiveVersionId("");
        } catch {
          // Local fallback keeps the page usable when opened as a file.
        }
        restoreOriginalPlaces();
        refreshNavForCurrentPlace();
        refreshIdeaExport();
        const status = document.getElementById("aiStatus");
        const output = document.getElementById("aiOutput");
        status.textContent = "已恢复原计划。";
        output.innerHTML = "已恢复到初始行程版本。已收集建议仍然保留，可以继续生成新版。";
      });

      clearIdeas?.addEventListener("click", async () => {
        if (!confirm("确定清空所有人已提交的建议吗？")) return;
        try {
          const data = await fetchJson("/api/ideas", { method: "DELETE" });
          saveIdeas(data.ideas || []);
          saveVersions(data.versions || getVersions());
          saveActiveVersionId(data.activeVersionId || activeVersionId);
        } catch {
          saveIdeas([]);
        }
        renderIdeaList();
        refreshIdeaExport();
      });
    }

    function renderPlace(id) {
      const place = places.find(item => item.id === id) || places[0];
      activePlaceId = place.id;
      renderNav(place.id);
      updateActiveRouteStops();

      if (place.id === "ideas") {
        renderIdeas();
        return;
      }

      detail.innerHTML = `
        <header class="place-head" style="background-image: url('${place.image}')">
          <div class="pill-row"><span class="pill">${place.dates}</span><span class="pill">${place.short}</span></div>
          <h2>${place.name}</h2>
          <p>${place.thesis}</p>
        </header>
        <div class="detail-body">
          <div class="main-col">
            <div class="block">
              <h4>独立行程</h4>
              <div class="timeline">
                ${place.days.map(slots).join("")}
              </div>
            </div>
          </div>
          <aside class="side-col">
            <div class="block">
              <h4>住宿建议</h4>
              ${place.hotels.map(hotel => `
                <div class="hotel">
                  <strong>${hotel[0]}</strong>
                  <p>${hotel[1]}</p>
                </div>
              `).join("")}
            </div>
            <div class="block">
              <h4>交通节点</h4>
              <ul class="list">${place.transport.map(item => `<li>${item}</li>`).join("")}</ul>
            </div>
            <div class="block">
              <h4>取舍建议</h4>
              <ul class="list">${place.advice.map(item => `<li>${item}</li>`).join("")}</ul>
            </div>
          </aside>
        </div>
      `;
    }

    bootstrapGeneratedTrip();
    bindTripSwitcher();
    renderWorkspaceTab(activeTripTemplate === "australia" ? "overview" : "create");
    renderPlace("perth");
    syncStateFromServer().then(() => {
      if (activeWorkspaceTab === "overview") {
        renderWorkspaceTab("overview");
        renderPlace(getActivePlaceId());
      }
    });
  </script>
</body>
</html>
